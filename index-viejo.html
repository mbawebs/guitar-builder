
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shredlab Dark Grey Mesh Preview</title>
<style>
:root{
  --bg:#5f6772;
  --bg2:#3f4650;
  --bg3:#2e353d;
  --panel:#4b535e;
  --panel2:#59636f;
  --card:#d7dde5;
  --card2:#c4ccd7;
  --text:#eef3f8;
  --darkText:#20252c;
  --muted:#c3cbd5;
  --accent:#72ffb6;
  --accent2:#8fb8ff;
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  font-family:Arial,sans-serif;
  color:var(--text);
  overflow:hidden;
  background:
    radial-gradient(circle at 72% 22%,rgba(143,184,255,.24),transparent 30%),
    radial-gradient(circle at 20% 82%,rgba(114,255,182,.16),transparent 28%),
    linear-gradient(135deg,var(--bg),var(--bg2) 48%,var(--bg3));
}

.app{
  min-height:100vh;
  display:grid;
  grid-template-columns:360px 1fr;
  gap:18px;
  padding:18px;
}

.sidebar{
  border-radius:28px;
  padding:20px;
  background:
    linear-gradient(180deg,rgba(92,102,114,.92),rgba(58,65,75,.92));
  border:1px solid rgba(255,255,255,.22);
  box-shadow:
    0 28px 70px rgba(0,0,0,.28),
    inset 0 1px 0 rgba(255,255,255,.22);
}

.brand{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:22px;
}

.logo{
  font-size:30px;
  font-weight:900;
  letter-spacing:.09em;
}

.badge{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#111820;
  padding:8px 12px;
  border-radius:999px;
  font-weight:900;
  font-size:12px;
}

.tabs{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:18px;
}

.tab{
  border-radius:18px;
  padding:14px 12px;
  background:linear-gradient(145deg,#dce2ea,#b7c0cc);
  color:var(--darkText);
  font-weight:900;
  box-shadow:
    0 10px 20px rgba(0,0,0,.18),
    inset 0 1px 0 rgba(255,255,255,.95);
  border:1px solid rgba(255,255,255,.55);
}

.tab.active{
  background:linear-gradient(135deg,#8affc3,#8fb8ff);
  box-shadow:
    0 0 24px rgba(114,255,182,.34),
    0 10px 24px rgba(0,0,0,.2),
    inset 0 1px 0 rgba(255,255,255,.9);
}

.section{
  border-radius:24px;
  padding:16px;
  background:rgba(46,53,61,.55);
  border:1px solid rgba(255,255,255,.15);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.12);
}

.sectionTitle{
  font-size:12px;
  letter-spacing:.14em;
  font-weight:900;
  color:#f3f6fa;
}

.cards{
  margin-top:14px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.card{
  height:82px;
  border-radius:20px;
  padding:13px;
  color:var(--darkText);
  font-weight:900;
  background:
    linear-gradient(145deg,var(--card),var(--card2));
  border:1px solid rgba(255,255,255,.7);
  box-shadow:
    0 12px 24px rgba(0,0,0,.2),
    inset 0 1px 0 rgba(255,255,255,.95);
  transition:.18s;
  position:relative;
  overflow:hidden;
}

.card:before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(115deg,transparent 0%,rgba(255,255,255,.55) 45%,transparent 65%);
  transform:translateX(-120%);
  transition:.4s;
}

.card:hover{
  transform:translateY(-3px) scale(1.02);
}

.card:hover:before{
  transform:translateX(120%);
}

.card.active{
  outline:2px solid var(--accent);
  box-shadow:
    0 0 26px rgba(114,255,182,.38),
    0 14px 26px rgba(0,0,0,.2);
}

.stage{
  position:relative;
  border-radius:30px;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    radial-gradient(circle at center,rgba(255,255,255,.17),transparent 42%),
    linear-gradient(180deg,#68717d,#3a414b);
  border:1px solid rgba(255,255,255,.2);
  box-shadow:
    0 28px 70px rgba(0,0,0,.25),
    inset 0 1px 0 rgba(255,255,255,.22);
}

.stage:before{
  content:"";
  position:absolute;
  inset:-30%;
  background-image:
    linear-gradient(rgba(255,255,255,.20) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.20) 1px, transparent 1px);
  background-size:42px 42px;
  transform:perspective(600px) rotateX(58deg) translateY(110px) scale(1.5);
  transform-origin:center;
  opacity:.45;
}

.stage:after{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(90deg,transparent,rgba(143,184,255,.13),transparent),
    radial-gradient(ellipse at center,transparent 25%,rgba(20,24,30,.38) 90%);
  pointer-events:none;
}

.watermark{
  position:absolute;
  top:26px;
  left:30px;
  z-index:2;
  opacity:.4;
}

.watermark h1{
  margin:0;
  font-size:70px;
  line-height:.85;
  letter-spacing:.1em;
  color:rgba(255,255,255,.35);
}

.watermark p{
  margin-top:10px;
  letter-spacing:.24em;
  font-size:12px;
  color:rgba(255,255,255,.52);
}

.guitarPlaceholder{
  position:relative;
  z-index:3;
  width:320px;
  height:760px;
  border-radius:44px;
  transform:rotate(-20deg);
  background:
    radial-gradient(circle at 50% 10%,rgba(255,255,255,.7),transparent 25%),
    linear-gradient(145deg,#e6ebf2,#9fa9b5 55%,#767f8b);
  box-shadow:
    0 70px 90px rgba(0,0,0,.36),
    0 0 80px rgba(143,184,255,.25);
  opacity:.65;
}

.floatText{
  position:absolute;
  right:28px;
  bottom:24px;
  z-index:4;
  padding:14px 18px;
  border-radius:18px;
  background:rgba(210,218,228,.72);
  color:#20252c;
  font-weight:900;
  box-shadow:0 16px 30px rgba(0,0,0,.2);
}
</style>
</head>

<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div>
        <div class="logo">SHREDLAB</div>
        <div style="color:var(--muted);font-size:13px;margin-top:5px;">custom weapon builder</div>
      </div>
      <div class="badge">BETA</div>
    </div>

    <div class="tabs">
      <div class="tab active">🎸 CORE</div>
      <div class="tab">⚡ PICKUPS</div>
      <div class="tab">💍 RINGS</div>
      <div class="tab">🔩 HARDWARE</div>
    </div>

    <div class="section">
      <div class="sectionTitle">BODY COLORS</div>
      <div class="cards">
        <div class="card active">Arctic White</div>
        <div class="card">Gunmetal</div>
        <div class="card">Slime Green</div>
        <div class="card">Solar Orange</div>
      </div>
    </div>
  </aside>

  <main class="stage">
    <div class="watermark">
      <h1>GUITAR</h1>
      <p>BUILD YOUR WEAPON</p>
    </div>

    <div class="guitarPlaceholder"></div>

    <div class="floatText">MESH STAGE AREA</div>
  </main>
</div>
</body>
</html>
